<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Página de la organización fedesarrollo — repositorios y apps." />
  <title>fedesarrollo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Hero -->
  <header class="hero">
    <img
      class="hero-avatar"
      src="https://avatars.githubusercontent.com/fedesarrollo"
      alt="fedesarrollo logo"
      onerror="this.src='https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png'"
    />
    <h1>fedesarrollo</h1>
    <p>Organización de desarrollo — repositorios, experimentos y pequeñas apps abiertas.</p>
    <div class="hero-links">
      <a class="btn btn-primary" href="https://github.com/fedesarrollo" target="_blank" rel="noopener">
        <!-- Octicon mark-github -->
        <svg height="16" width="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
            0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
            -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
            .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
            -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
            .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
            .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
            0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        GitHub
      </a>
      <a class="btn" href="#repos" onclick="document.querySelector('[data-target=repos]').click()">
        📦 Repositorios
      </a>
      <a class="btn" href="#apps" onclick="document.querySelector('[data-target=apps]').click()">
        🚀 Apps
      </a>
    </div>
  </header>

  <!-- Nav tabs -->
  <nav class="nav-tabs" aria-label="Secciones">
    <button class="nav-tab active" data-target="repos">
      📦 Repositorios <span class="badge" id="repos-count">…</span>
    </button>
    <button class="nav-tab" data-target="apps">
      🚀 Apps <span class="badge" id="apps-count">…</span>
    </button>
  </nav>

  <!-- Main content -->
  <main>

    <!-- Repositories section -->
    <section id="repos" class="section active">
      <div class="section-header">
        <h2 class="section-title">Repositorios públicos</h2>
        <a class="btn" href="https://github.com/orgs/fedesarrollo/repositories" target="_blank" rel="noopener">
          Ver todos en GitHub →
        </a>
      </div>
      <div class="cards-grid" id="repos-grid">
        <!-- Populated by app.js -->
      </div>
    </section>

    <!-- Apps section -->
    <section id="apps" class="section">
      <div class="section-header">
        <h2 class="section-title">Apps &amp; proyectos</h2>
        <a class="btn" href="https://github.com/fedesarrollo" target="_blank" rel="noopener">
          Ver organización →
        </a>
      </div>
      <div class="cards-grid" id="apps-grid">
        <!-- Populated by app.js -->
      </div>
    </section>

  </main>

  <footer>
    <p>
      Hecho con ❤️ por
      <a href="https://github.com/fedesarrollo" target="_blank" rel="noopener">fedesarrollo</a>
      &nbsp;·&nbsp;
      <a href="https://github.com/fedesarrollo/fedesarrollo.github.io" target="_blank" rel="noopener">Código fuente</a>
    </p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
