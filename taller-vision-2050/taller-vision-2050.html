<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 Taller Visión 2050</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FBF8F3;--white:#FFFFFF;--accent:#c9a96e;--accent-light:#e8dcc4;
  --text:#2c3e50;--text-light:#5a6c7d;
  --reto-bg:#fef3c7;--reto-border:#fbbf24;--reto-text:#92400e;
  --mision-bg:#d1fae5;--mision-border:#10b981;--mision-text:#065f46;
  --oportunidad-bg:#fee2e2;--oportunidad-border:#ef4444;--oportunidad-text:#991b1b;
  --radius:16px;--shadow:0 4px 24px rgba(0,0,0,0.06);
  --font-display:'DM Serif Display',Georgia,serif;
  --font-body:'Source Sans 3','Segoe UI',Tahoma,sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* HEADER */
.header{background:var(--bg);border-bottom:3px solid var(--accent-light);padding:16px 24px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header h1{font-family:var(--font-display);font-size:1.5em;color:var(--text);text-align:center;letter-spacing:-0.02em}
.progress-wrap{height:6px;background:var(--accent-light);width:100%;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),#b8860b);transition:width 0.6s cubic-bezier(.4,0,.2,1);width:0%;border-radius:0 3px 3px 0}

/* MAIN CONTAINER */
.container{max-width:900px;margin:0 auto;padding:24px 16px 80px}

/* PHASE ANIMATIONS */
.phase{animation:fadeUp 0.5s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* TYPOGRAPHY */
.phase-emoji{font-size:3em;display:block;text-align:center;margin-bottom:8px}
.phase-title{font-family:var(--font-display);font-size:2em;text-align:center;margin-bottom:8px;color:var(--text);line-height:1.2}
.phase-subtitle{text-align:center;color:var(--text-light);font-size:1.05em;margin-bottom:32px;font-weight:300;max-width:560px;margin-left:auto;margin-right:auto;line-height:1.5}

/* FORM INPUTS */
.form-group{margin-bottom:20px}
.form-group label{display:block;font-weight:600;margin-bottom:6px;font-size:0.95em;color:var(--text)}
.form-group input,.form-group textarea{width:100%;padding:14px 16px;border:2px solid var(--accent-light);border-radius:12px;font-family:var(--font-body);font-size:1em;background:var(--white);color:var(--text);transition:border-color 0.3s,box-shadow 0.3s;outline:none;resize:vertical}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(201,169,110,0.15)}
.form-group input::placeholder,.form-group textarea::placeholder{color:#aaa}
.form-group .hint{font-size:0.85em;color:var(--text-light);margin-top:4px}
.error-msg{color:#dc2626;font-size:0.85em;margin-top:4px;display:none}

/* CARD GRID */
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:32px}
@media(max-width:900px){.card-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.card-grid{grid-template-columns:1fr}}

/* CARDS */
.card{border-radius:var(--radius);padding:20px;border:2px solid transparent;transition:transform 0.25s,box-shadow 0.25s;cursor:default;position:relative;overflow:hidden}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.1)}
.card-number{font-size:0.75em;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;opacity:0.6;margin-bottom:4px}
.card-icon{font-size:2em;margin-bottom:8px;display:block}
.card-type{font-size:0.7em;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:8px}
.card-title{font-family:var(--font-display);font-size:1.1em;margin-bottom:8px;line-height:1.3}
.card-desc{font-size:0.88em;line-height:1.55;color:inherit;opacity:0.85}

.card.reto{background:var(--reto-bg);border-color:var(--reto-border);color:var(--reto-text)}
.card.reto .card-type{background:var(--reto-border);color:#fff}
.card.mision{background:var(--mision-bg);border-color:var(--mision-border);color:var(--mision-text)}
.card.mision .card-type{background:var(--mision-border);color:#fff}
.card.oportunidad{background:var(--oportunidad-bg);border-color:var(--oportunidad-border);color:var(--oportunidad-text)}
.card.oportunidad .card-type{background:var(--oportunidad-border);color:#fff}

/* SINGLE CARD (comment phase) */
.single-card{max-width:640px;margin:0 auto 24px}
.single-card .card{cursor:default}
.card-counter{text-align:center;font-weight:600;color:var(--text-light);margin-bottom:16px;font-size:0.95em}

/* BUTTONS */
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px}
.btn{padding:14px 28px;border-radius:12px;border:none;font-family:var(--font-body);font-size:1em;font-weight:600;cursor:pointer;transition:all 0.25s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(201,169,110,0.3)}
.btn-primary:hover{background:#b8860b;transform:translateY(-2px);box-shadow:0 6px 20px rgba(201,169,110,0.4)}
.btn-secondary{background:var(--white);color:var(--text);border:2px solid var(--accent-light)}
.btn-secondary:hover{border-color:var(--accent);background:#faf6ef}
.btn-skip{background:transparent;color:var(--text-light);border:2px solid #ddd}
.btn-skip:hover{border-color:#bbb;color:var(--text)}
.btn-green{background:#10b981;color:#fff;box-shadow:0 4px 16px rgba(16,185,129,0.3)}
.btn-green:hover{background:#059669;transform:translateY(-2px)}
.btn-danger{background:#ef4444;color:#fff}
.btn-danger:hover{background:#dc2626}

/* ADDITIONAL FIELDS */
.additional-fields{max-width:640px;margin:0 auto}
.additional-field{margin-bottom:20px}
.additional-field label{display:block;font-weight:600;margin-bottom:6px;font-size:0.95em}
.additional-field textarea{width:100%;padding:14px 16px;border:2px solid var(--accent-light);border-radius:12px;font-family:var(--font-body);font-size:1em;min-height:80px;resize:vertical;outline:none;transition:border-color 0.3s,box-shadow 0.3s}
.additional-field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(201,169,110,0.15)}

/* SUMMARY */
.summary-section{background:var(--white);border-radius:var(--radius);padding:24px;margin-bottom:20px;box-shadow:var(--shadow)}
.summary-section h3{font-family:var(--font-display);font-size:1.3em;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--accent-light)}
.summary-item{margin-bottom:16px;padding:12px 16px;border-radius:12px;background:var(--bg)}
.summary-item .item-title{font-weight:600;margin-bottom:4px}
.summary-item .item-comment{font-size:0.95em;color:var(--text-light);line-height:1.5}
.summary-participant{display:grid;grid-template-columns:auto 1fr;gap:8px 16px;font-size:1em}
.summary-participant dt{font-weight:600;color:var(--text)}
.summary-participant dd{color:var(--text-light)}

/* CONFETTI */
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;overflow:hidden}
.confetti{position:absolute;width:10px;height:10px;border-radius:50%;top:-20px;animation:confettiFall linear forwards}
@keyframes confettiFall{
  0%{transform:translateX(0) rotate(0deg);opacity:1}
  100%{transform:translateX(var(--drift)) rotate(720deg);opacity:0}
}

/* EMPTY STATE */
.empty-state{text-align:center;color:var(--text-light);font-style:italic;padding:16px}

/* REGISTER CARD */
.register-card{max-width:480px;margin:0 auto;background:var(--white);border-radius:var(--radius);padding:32px;box-shadow:var(--shadow)}

/* SCROLLBAR */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--accent-light);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

/* NOISE OVERLAY */
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:-1;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
</style>
</head>
<body>

<div class="header">
  <h1>🎯 Taller Visión 2050</h1>
</div>
<div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

<div class="container" id="app"></div>

<script>
// ==================== DATA ====================
const RETOS = [
  {id:1,icon:"🏭",title:"Baja complejidad productiva",desc:"Baja complejidad productiva y limitada sofisticación de la canasta exportadora, dominada por productos primarios y manufacturas basadas en recursos naturales, lo cual limita la diversificación económica. La economía de Santander depende casi exclusivamente del petróleo e incorpora bajo valor agregado a las actividades productivas lo que le dificulta insertarse en las cadenas de valor internacionales."},
  {id:2,icon:"🛣️",title:"Infraestructura vial deficiente",desc:"Infraestructura vial deficiente que genera costos logísticos elevados y dificultades de desplazamiento para la población. Las carreteras están completamente deterioradas, especialmente las secundarias. Esto encarece el transporte, retrasa entregas y hace que Santander pierda competitividad frente a otras regiones del país, además de dificultar la movilidad de la población para fines personales, de salud, educación etc."},
  {id:3,icon:"📊",title:"Asimetrías territoriales",desc:"Asimetrías entre Área Metropolitana y Provincias en concentración urbana, desigualdad/pobreza, y diversificación productiva. Las brechas en inversión, calidad educativa y diversificación productiva entre el Área Metropolitana y las Provincias producen asimetrías territoriales en las condiciones de desarrollo, causando despoblamiento rural y alto crecimiento urbano para Bucaramanga generando retos importantes para la ciudad."},
  {id:4,icon:"🌾",title:"Dependencia alimentaria",desc:"Baja productividad del sistema agrícola genera una dependencia alimentaria creciente. La tasa de suficiencia agroalimentaria de 0.52 indica que la producción local cubre apenas 50% de necesidades calóricas, requiriendo importaciones."},
  {id:5,icon:"💧",title:"Fragilidad en saneamiento",desc:"Fragilidad sistémica en saneamiento básico, sistemas de agua y gestión de residuos. Fallas estructurales en los sistemas de agua, saneamiento y residuos generan riesgos ambientales y sociales crecientes."},
  {id:6,icon:"🌪️",title:"Vulnerabilidad a amenazas naturales",desc:"Vulnerabilidad ante amenazas naturales y gestión del riesgo. Santander está expuesto a riesgos naturales por su ubicación en un nido sísmico y su susceptibilidad a deslizamientos e inundaciones, agravada por cambios climáticos significativos como variaciones en precipitación y temperatura, que incrementan la frecuencia e intensidad de eventos climáticos extremos (inundaciones, incendios) que afectan al medio ambiente, la producción agrícola y la salud de sus habitantes."},
  {id:7,icon:"🏔️",title:"Conflictos socioambientales",desc:"Conflictos socioambientales asociados con la presión sobre el uso del suelo y la preservación de ecosistemas de páramo. Persiste una tensión entre el desarrollo económico y la protección de los ecosistemas, ante la falta de un equilibrio sostenible que permita avanzar en ambos frentes de manera simultánea, generando conflictos, incertidumbre e inseguridad en las comunidades."},
  {id:8,icon:"⚡",title:"Transición energética urgente",desc:"Urgencia de transición energética hacia energías limpias debido a la declinación de la economía de hidrocarburos y la alta dependencia actual de ese sector productivo. La producción petrolera cae aceleradamente sin ningún plan de transición amenazando a miles de empleos. Actualmente, la región no tiene claro hacia dónde dirigir la estrategia de desarrollo para reemplazar el petróleo."},
  {id:9,icon:"🔬",title:"Baja inversión en CTI",desc:"Bajo nivel de inversión, coordinación e investigación en Ciencia, Tecnología e Innovación limitan la formación de una 'sociedad del conocimiento' y la intervención en problemas sociales y ambientales a través de estas herramientas. Santander invierte muy poco en investigación, desarrollo e innovación. El talento local no se aprovecha."},
  {id:10,icon:"👷",title:"Informalidad laboral alta",desc:"Alta informalidad laboral, desconexión entre la formación de talento humano y el mercado de trabajo, especialmente en formación en Ciencia, Tecnología, Ingeniería y Matemáticas frente a las demandas de la nueva economía. Los programas académicos universitarios están desconectados de las necesidades del mercado laboral regional. Los jóvenes estudian carreras sin demanda. Terminan desempleados o emigrando a buscar oportunidades en otras ciudades."},
  {id:11,icon:"🏛️",title:"Débil coordinación institucional",desc:"Débil coordinación institucional y baja confianza en el sector público por falta de transparencia y limitada capacidad de gestión de recursos. La falta de transparencia ha erosionado la credibilidad del sector público, debilitando su rol como articulador institucional y limitando la efectividad de la acción colectiva y el uso eficiente de los recursos."},
  {id:12,icon:"🚨",title:"Inseguridad multidimensional",desc:"Inseguridad multidimensional persistente, que se manifiesta en alta criminalidad urbana y presencia de grupos armados ilegales. La alta criminalidad urbana y la presencia de grupos armados ilegales erosionan la convivencia, la confianza institucional y el desarrollo territorial."},
  {id:13,icon:"🏥",title:"Brechas en salud",desc:"Brechas en la infraestructura de servicios de salud y atención especializada, entre la capital y las Provincias. La concentración de infraestructura y servicios de salud especializados en la capital genera barreras de acceso para la población de las Provincias, obligando a desplazamientos frecuentes y retrasando la atención oportuna."},
  {id:14,icon:"✈️",title:"Fuga de capital humano",desc:"Fuga de capital humano y crisis migratoria. La salida de capital humano calificado y la llegada de población en situación de alta vulnerabilidad configuran una presión migratoria que tensiona el mercado laboral, los servicios sociales y las capacidades locales."}
];

const MISIONES = [
  {id:1,icon:"📦",title:"Plataforma exportadora",desc:"Consolidar a la región como una plataforma exportadora diversificada y competitiva, superando los mil millones de dólares anuales en exportaciones de bienes y servicios al 2050"},
  {id:2,icon:"🚛",title:"Corazón logístico",desc:"Consolidar a Santander como el corazón logístico de Colombia para superar los principales cuellos de botella logísticos hacia 2050"},
  {id:3,icon:"🌄",title:"Desarrollo provincial equilibrado",desc:"Generar en todas las Provincias un motor productivo y de ingresos atractivos para sus habitantes, conectándolo a mercados y asegurando condiciones para que la población rural permanezca en el territorio al 2050 y que el desarrollo sea equilibrado entre Bucaramanga y las Provincias"},
  {id:4,icon:"🌾",title:"Sistemas alimentarios sostenibles",desc:"Para 2050, Santander habrá consolidado sistemas alimentarios sostenibles que permitan no sólo cubrir las necesidades alimenticias de su población sino posicionarse como un líder en exportación de productos agrícolas de alto valor agregado"},
  {id:5,icon:"♻️",title:"Economía circular líder",desc:"Transformar a Santander en región líder de economía circular mediante sistemas de aprovechamiento de residuos y la universalización del tratamiento de aguas residuales etc."},
  {id:6,icon:"🛡️",title:"Reducir exposición a riesgos",desc:"Reducir significativamente la exposición poblacional a amenazas naturales para 2050"},
  {id:7,icon:"🌳",title:"Conservación de ecosistemas",desc:"Lograr en 2050 una estrategia de conservación de ecosistemas estratégicos, integrando criterios de ordenamiento del suelo que combinen protección y producción sostenible"},
  {id:8,icon:"☀️",title:"Líder en energías alternativas",desc:"Aprovechar las capacidades regionales para posicionarse en 2050 como el departamento líder en producción, distribución y exportaciones de energía proveniente de fuentes alternativas al petróleo convencional"},
  {id:9,icon:"💡",title:"Centro de innovación",desc:"Consolidar a Santander como centro regional de innovación, apoyadas por un ecosistema de capital de riesgo local y centros de Investigación, Desarrollo e innovación sectoriales para 2050"},
  {id:10,icon:"💼",title:"Empleo formal especializado",desc:"Que cuatro de cada cinco trabajadores sean formales, su mayoría en empleos especializados, al 2050"},
  {id:11,icon:"🏛️",title:"Sector público transparente",desc:"Consolidar un sector público transparente y confiable en Santander, capaz de liderar la coordinación institucional y maximizar el impacto de la inversión pública al 2050"},
  {id:12,icon:"🔒",title:"Reducción de criminalidad",desc:"Reducir en los índices de criminalidad provincial para 2050"},
  {id:13,icon:"⚕️",title:"Salud de calidad universal",desc:"Para 2050, cerrar la brecha de atención especializada conectando los 87 municipios con hospitales de tercer nivel y siendo una referencia por la calidad y la rapidez de su sistema de salud"},
  {id:14,icon:"🎓",title:"Retener capital humano",desc:"Posicionar a Santander como referente en retener capital humano regional siendo un centro estratégico para 2050"}
];

const OPORTUNIDADES = [
  {id:1,icon:"💰",title:"Nuevas cadenas de valor",desc:"Desarrollo de nuevas cadenas de valor exportadoras y servicios intensivos en conocimiento, con potencial de generar 1.440 millones de dólares en exportaciones al 2030 y más de 5.690 millones de dólares anuales al 2050."},
  {id:2,icon:"📉",title:"Reducción costos logísticos",desc:"Reducción del 27,6% en los costos logísticos de exportación. Habilitación de la capacidad logística para movilizar hasta 19 millones de toneladas anuales de carga a través del río Magdalena."},
  {id:3,icon:"👨‍🌾",title:"Empleo en provincias",desc:"Generación de empleos directos y aumento de inversión en las Provincias. Lograr que el 25% de la población permanezca en la zona rural."},
  {id:4,icon:"🌽",title:"Autosuficiencia alimentaria",desc:"Fortalecimiento de la economía campesina y producción primaria para aumentar la productividad y la tasa de suficiencia agroalimentaria (actualmente 0.52), reduciendo la dependencia de importaciones y mejorando los estándares nutricionales, y posicionar a Santander en nichos de alto valor agregado"},
  {id:5,icon:"♻️",title:"Mercado de residuos",desc:"Captura de valor en un mercado nacional de aprovechamiento de residuos valorado en $600.000 millones de pesos. Cobertura del 100% en acueducto y 90% en saneamiento básico en zonas rurales."},
  {id:6,icon:"🏗️",title:"Sistema resiliente",desc:"Ahorros económicos y sociales al promover un sistema resiliente a los riesgos naturales así mismo cómo inversión y empleo gracias a la construcción de nuevos sistemas de prevención y manejo de riesgos."},
  {id:7,icon:"⚖️",title:"Gobernanza territorial",desc:"Mejora de la seguridad y gobernanza territorial mediante la reducción de conflictos por uso del suelo de 42.8% a 21.4%."},
  {id:8,icon:"🔋",title:"Industria energías renovables",desc:"Crecimiento del PIB por fuentes de energía alternativas al petróleo convencional. Fomento de la industria de energías renovables (solar y eólica), atrayendo la inversión privada de $1.2 millones de dólares por MW. Meta aspiracional de producción de 1 millón de toneladas de Hidrógeno de bajas emisiones al 2040."},
  {id:9,icon:"🔬",title:"Inversión en I+D",desc:"Inversión en Investigación y Desarrollo: Movilización de recursos para alcanzar una inversión en Actividades de Ciencia, Tecnología e Innovación equivalente al 1% del PIB acorde con una gran apuesta. Generar ventas superiores a $4.000 millones por empresa startup de alto impacto en sus primeros 5-10 años financiado por capital de riesgo Santandereano y redes de ángeles inversionistas."},
  {id:10,icon:"👨‍💻",title:"Empleos de alta complejidad",desc:"Generar 2.975 nuevos empleos de alta complejidad mediante el cierre de la brecha de talento bilingüe y Ciencia, Tecnología, Ingeniería y Matemáticas. Reducción de la tasa de informalidad a menos del 40% para 2030 y menos del 20% al 2050."},
  {id:11,icon:"📊",title:"Gestión pública eficiente",desc:"Elevar a 80 el Índice de Gestión de desempeño de Proyectos de Regalías por encima del promedio Nacional de las entidades ejecutoras de Proyectos del Sistema General de Regalías. Reducción del riesgo institucional y mejora del clima de inversión, habilitando mayores flujos de capital y proyectos de alto impacto en Santander."},
  {id:12,icon:"📱",title:"Tecnología para seguridad",desc:"Tecnología para Seguridad: Disminución del 10% en índices de riesgo y criminalidad mediante tecnología."},
  {id:13,icon:"🏥",title:"Sector salud competitivo",desc:"Generación de crecimiento ligado al sector salud y mejora de la atención mediante la reducción de 50% los tiempos de diagnóstico y atención."},
  {id:14,icon:"🌍",title:"Aprovechar migración",desc:"Disminuir la fuga de personas calificadas y aprovechar las oportunidades en capital humano que trae la migración."}
];

// ==================== STATE ====================
const estado = {
  faseActual: 0,
  usuario: { nombre: '', origen: '', institucion: '' },
  comentarios: { retos: {}, misiones: {}, oportunidades: {} },
  retosAdicionales: ['','',''],
  misionesAdicionales: ['','',''],
  oportunidadesAdicionales: ['','',''],
  indiceRetoActual: 0,
  indiceMisionActual: 0,
  indiceOportunidadActual: 0
};

// ==================== HELPERS ====================
const $ = id => document.getElementById(id);
const app = () => $('app');
const progressBar = () => $('progressBar');

function updateProgress() {
  // phases: 0,1,2,2.5,3,4,4.5,5,6,6.5,7 => 11 steps
  const map = {0:0, 1:1, 2:2, 2.5:3, 3:4, 4:5, 4.5:6, 5:7, 6:8, 6.5:9, 7:10};
  const step = map[estado.faseActual] || 0;
  progressBar().style.width = (step / 10 * 100) + '%';
}

function scrollTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderCard(item, type) {
  const cls = type === 'reto' ? 'reto' : type === 'mision' ? 'mision' : 'oportunidad';
  const typeLabel = type === 'reto' ? 'RETO' : type === 'mision' ? 'MISIÓN' : 'OPORTUNIDAD';
  return `<div class="card ${cls}">
    <span class="card-number">#${item.id}</span>
    <span class="card-icon">${item.icon}</span>
    <span class="card-type">${typeLabel}</span>
    <div class="card-title">${item.title}</div>
    <div class="card-desc">${item.desc}</div>
  </div>`;
}

function navigate(fase) {
  estado.faseActual = fase;

function validarRegistro() {
  const n = $('nombre').value.trim();
  const o = $('origen').value.trim();
  const i = $('institucion').value.trim();
  let valid = true;
  [['nombre','errNombre',n],['origen','errOrigen',o],['institucion','errInstitucion',i]].forEach(([fid,eid,val]) => {
    const el = $(eid);
    if (!val) { el.style.display = 'block'; $(fid).style.borderColor = '#dc2626'; valid = false; }
    else { el.style.display = 'none'; $(fid).style.borderColor = ''; }
  });
  if (!valid) return;
  estado.usuario = { nombre: n, origen: o, institucion: i };
  navigate(1);
}

// ==================== CONFETTI ====================
function launchConfetti() {
  const c = document.createElement('div');
  c.className = 'confetti-container';
  document.body.appendChild(c);
  const colors = ['#fbbf24','#10b981','#ef4444','#3b82f6','#8b5cf6','#ec4899','#f97316','#14b8a6'];
  for (let i = 0; i < 100; i++) {
    const p = document.createElement('div');
    p.className = 'confetti';
    p.style.left = Math.random() * 100 + '%';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.width = (6 + Math.random() * 8) + 'px';
    p.style.height = p.style.width;
    p.style.setProperty('--drift', (Math.random() * 200 - 100) + 'px');
    p.style.animationDuration = (2 + Math.random() * 3) + 's';
    p.style.animationDelay = Math.random() * 2 + 's';
    c.appendChild(p);
  }
  setTimeout(() => c.remove(), 6000);
}

// ==================== EXPORT ====================
function generarTexto() {
  const sep = '═══════════════════════════════════════════════════════';
  const sep2 = '─────────────────────────────────────────────────────';
  const fecha = new Date().toLocaleString('es-CO', { timeZone: 'America/Bogota', dateStyle: 'full', timeStyle: 'medium' });
  let txt = `${sep}\nTALLER CUALITATIVO - RESULTADOS\n${sep}\n\nFecha: ${fecha}\n\n${sep2}\nPARTICIPANTE\n${sep2}\nNombre:      ${estado.usuario.nombre}\nOrigen:      ${estado.usuario.origen}\nInstitución: ${estado.usuario.institucion}\n`;

  // Retos
  txt += `\n${sep2}\nCOMENTARIOS SOBRE RETOS\n${sep2}\n`;
  const rc = estado.comentarios.retos;
  if (Object.keys(rc).length) {
    Object.keys(rc).forEach(id => {
      const r = RETOS.find(x => x.id == id);
      txt += `\n► ${r.icon} ${r.title}\n${rc[id]}\n`;
    });
  } else txt += '\n(Sin comentarios)\n';

  const ra = estado.retosAdicionales.filter(x => x);
  if (ra.length) {
    txt += `\n${sep2}\nRETOS ADICIONALES AGREGADOS\n${sep2}\n`;
    ra.forEach((t, i) => txt += `${i + 1}. ${t}\n`);
  }

  // Misiones
  txt += `\n${sep2}\nCOMENTARIOS SOBRE MISIONES\n${sep2}\n`;
  const mc = estado.comentarios.misiones;
  if (Object.keys(mc).length) {
    Object.keys(mc).forEach(id => {
      const m = MISIONES.find(x => x.id == id);
      txt += `\n► ${m.icon} ${m.title}\n${mc[id]}\n`;
    });
  } else txt += '\n(Sin comentarios)\n';

  const ma = estado.misionesAdicionales.filter(x => x);
  if (ma.length) {
    txt += `\n${sep2}\nMISIONES ADICIONALES AGREGADAS\n${sep2}\n`;
    ma.forEach((t, i) => txt += `${i + 1}. ${t}\n`);
  }

  // Oportunidades
  txt += `\n${sep2}\nCOMENTARIOS SOBRE OPORTUNIDADES\n${sep2}\n`;
  const oc = estado.comentarios.oportunidades;
  if (Object.keys(oc).length) {
    Object.keys(oc).forEach(id => {
      const o = OPORTUNIDADES.find(x => x.id == id);
      txt += `\n► ${o.icon} ${o.title}\n${oc[id]}\n`;
    });
  } else txt += '\n(Sin comentarios)\n';

  const oa = estado.oportunidadesAdicionales.filter(x => x);
  if (oa.length) {
    txt += `\n${sep2}\nOPORTUNIDADES ADICIONALES AGREGADAS\n${sep2}\n`;
    oa.forEach((t, i) => txt += `${i + 1}. ${t}\n`);
  }

  txt += `\n${sep}\nFin del reporte\n${sep}\n`;
  return txt;
}

function descargarYEnviar() {
  const txt = generarTexto();
  const timestamp = Date.now();
  const filename = `Taller-${estado.usuario.nombre.replace(/\s+/g,'_')}_${timestamp}.txt`;

  // Download
  const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);

  // Email
  const subject = encodeURIComponent(`Resultados Taller Cualitativo - ${estado.usuario.nombre}`);
  const body = encodeURIComponent(txt);
  setTimeout(() => {
    window.location.href = `mailto:santander2050@fedesarrollo.org.co?subject=${subject}&body=${body}`;
  }, 500);
}

function nuevoTaller() {
  if (confirm('¿Estás seguro? Se perderán todos los datos del taller actual.')) {
    estado.faseActual = 0;
    estado.usuario = { nombre: '', origen: '', institucion: '' };
    estado.comentarios = { retos: {}, misiones: {}, oportunidades: {} };
    estado.retosAdicionales = ['','',''];
    estado.misionesAdicionales = ['','',''];
    estado.oportunidadesAdicionales = ['','',''];
    estado.indiceRetoActual = 0;
    estado.indiceMisionActual = 0;
    estado.indiceOportunidadActual = 0;
    navigate(0);
  }
}

// ==================== MAIN RENDER ====================
function render() {
  const f = estado.faseActual;
  if (f === 0) renderFase0();
  else if (f === 1) renderFase1();
  else if (f === 2) renderFase2();
  else if (f === 2.5) renderFase25();
  else if (f === 3) renderFase3();
  else if (f === 4) renderFase4();
  else if (f === 4.5) renderFase45();
  else if (f === 5) renderFase5();
  else if (f === 6) renderFase6();
  else if (f === 6.5) renderFase65();
  else if (f === 7) renderFase7();
}

// INIT
updateProgress();
render();
</script>
